<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6CC" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#FFD979" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FFB648" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F8B648" stop-opacity="0.82"/>
      <stop offset="15%" stop-color="#FFE7A6" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFF7D9" stop-opacity="1"/>
      <stop offset="85%" stop-color="#FFD16A" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#F4AB3A" stop-opacity="0.78"/>
    </linearGradient>

    <linearGradient id="softStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0A43E" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FFE29A" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#F0A43E" stop-opacity="0.16"/>
    </linearGradient>

    <filter id="blurSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="blurMed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blurLarge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <g id="spark4">
      <path d="M0 -16 C0 -7 7 0 16 0 C7 0 0 7 0 16 C0 7 -7 0 -16 0 C-7 0 0 -7 0 -16Z" fill="#FFF3BF" fill-opacity="0.95"/>
      <path d="M0 -24 L0 24" stroke="#FFD57B" stroke-opacity="0.6" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-24 0 L24 0" stroke="#FFD57B" stroke-opacity="0.6" stroke-width="1.3" stroke-linecap="round"/>
    </g>
    <g id="sparkTiny">
      <circle cx="0" cy="0" r="2.1" fill="#FFF4C9" fill-opacity="0.95"/>
      <path d="M0 -6 L0 6" stroke="#FFD067" stroke-opacity="0.55" stroke-width="0.9" stroke-linecap="round"/>
      <path d="M-6 0 L6 0" stroke="#FFD067" stroke-opacity="0.55" stroke-width="0.9" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- soft center haze -->
  <ellipse cx="512" cy="560" rx="260" ry="98" fill="url(#coreGlow)"/>
  <ellipse cx="512" cy="560" rx="225" ry="82" fill="url(#coreGlow)" opacity="0.55"/>

  <!-- wide atmospheric glow rings -->
  <g filter="url(#blurLarge)">
    <ellipse cx="512" cy="560" rx="425" ry="152" stroke="#FFC766" stroke-opacity="0.18" stroke-width="8"/>
    <ellipse cx="512" cy="560" rx="380" ry="135" stroke="#FFD37F" stroke-opacity="0.20" stroke-width="7"/>
    <ellipse cx="512" cy="560" rx="320" ry="114" stroke="#FFD37F" stroke-opacity="0.22" stroke-width="10"/>
    <ellipse cx="512" cy="560" rx="275" ry="96" stroke="#FFE39D" stroke-opacity="0.23" stroke-width="8"/>
  </g>

  <!-- outer hairline rings -->
  <g opacity="0.95">
    <ellipse cx="512" cy="560" rx="428" ry="154" stroke="url(#softStroke)" stroke-width="1.6"/>
    <ellipse cx="512" cy="560" rx="378" ry="135" stroke="url(#softStroke)" stroke-width="1.5"/>
    <ellipse cx="512" cy="560" rx="332" ry="118" stroke="url(#softStroke)" stroke-width="1.45"/>
    <ellipse cx="512" cy="560" rx="300" ry="108" stroke="url(#softStroke)" stroke-width="1.35" opacity="0.95"/>
  </g>

  <!-- bright main ring system -->
  <g filter="url(#blurMed)" opacity="0.95">
    <ellipse cx="512" cy="560" rx="305" ry="108" stroke="#FFF0B6" stroke-opacity="0.60" stroke-width="15"/>
    <ellipse cx="512" cy="560" rx="285" ry="100" stroke="#FFD36B" stroke-opacity="0.46" stroke-width="12"/>
    <ellipse cx="512" cy="560" rx="258" ry="90" stroke="#FFD36B" stroke-opacity="0.38" stroke-width="10"/>
  </g>
  <g>
    <ellipse cx="512" cy="560" rx="305" ry="108" stroke="url(#ringStroke)" stroke-width="4.6"/>
    <ellipse cx="512" cy="560" rx="296" ry="105" stroke="#FFF2C0" stroke-opacity="0.65" stroke-width="1.8"/>
    <ellipse cx="512" cy="560" rx="285" ry="100" stroke="url(#ringStroke)" stroke-width="2.7" opacity="0.92"/>
    <ellipse cx="512" cy="560" rx="258" ry="90" stroke="url(#ringStroke)" stroke-width="2.1" opacity="0.88"/>
    <ellipse cx="512" cy="560" rx="227" ry="79" stroke="url(#softStroke)" stroke-width="1.7" opacity="0.8"/>
  </g>

  <!-- wispy motion streaks -->
  <g stroke-linecap="round" fill="none">
    <path d="M226 553 C289 505 733 498 796 549" stroke="#FFE4A4" stroke-opacity="0.40" stroke-width="1.8" filter="url(#blurSmall)"/>
    <path d="M240 573 C324 622 703 621 783 572" stroke="#FFD06E" stroke-opacity="0.30" stroke-width="1.6" filter="url(#blurSmall)"/>
    <path d="M266 530 C346 487 677 488 755 531" stroke="#FFD67E" stroke-opacity="0.22" stroke-width="1.4" filter="url(#blurSmall)"/>
    <path d="M284 592 C360 632 663 633 742 591" stroke="#FFD67E" stroke-opacity="0.24" stroke-width="1.35" filter="url(#blurSmall)"/>
  </g>

  <!-- cardinal flares -->
  <g>
    <g transform="translate(512 410)"><use href="#spark4"/></g>
    <g transform="translate(512 714)"><use href="#spark4"/></g>
    <g transform="translate(172 560)"><use href="#spark4"/></g>
    <g transform="translate(852 560)"><use href="#spark4"/></g>
  </g>

  <!-- highlight dots on ring -->
  <g>
    <g transform="translate(290 500)"><use href="#sparkTiny"/></g>
    <g transform="translate(355 450)"><use href="#sparkTiny"/></g>
    <g transform="translate(430 422)"><use href="#sparkTiny"/></g>
    <g transform="translate(512 430)"><use href="#sparkTiny"/></g>
    <g transform="translate(594 422)"><use href="#sparkTiny"/></g>
    <g transform="translate(669 450)"><use href="#sparkTiny"/></g>
    <g transform="translate(734 500)"><use href="#sparkTiny"/></g>
    <g transform="translate(786 562)"><use href="#sparkTiny"/></g>
    <g transform="translate(730 622)"><use href="#sparkTiny"/></g>
    <g transform="translate(645 680)"><use href="#sparkTiny"/></g>
    <g transform="translate(512 692)"><use href="#sparkTiny"/></g>
    <g transform="translate(380 680)"><use href="#sparkTiny"/></g>
    <g transform="translate(292 620)"><use href="#sparkTiny"/></g>
    <g transform="translate(208 545)"><use href="#sparkTiny"/></g>
  </g>

  <!-- dust particles -->
  <g fill="#FFD37A" fill-opacity="0.7">
    <circle cx="420" cy="520" r="1.35"/>
    <circle cx="442" cy="525" r="1.0"/>
    <circle cx="466" cy="533" r="1.0"/>
    <circle cx="585" cy="522" r="1.25"/>
    <circle cx="615" cy="528" r="1.0"/>
    <circle cx="646" cy="536" r="1.15"/>
    <circle cx="415" cy="605" r="1.0"/>
    <circle cx="452" cy="617" r="1.15"/>
    <circle cx="604" cy="615" r="1.1"/>
    <circle cx="631" cy="605" r="1.0"/>
    <circle cx="257" cy="586" r="1.4"/>
    <circle cx="761" cy="590" r="1.35"/>
    <circle cx="330" cy="470" r="1.1"/>
    <circle cx="698" cy="471" r="1.1"/>
    <circle cx="356" cy="500" r="0.9"/>
    <circle cx="676" cy="503" r="0.9"/>
    <circle cx="514" cy="489" r="1.1"/>
    <circle cx="514" cy="629" r="1.1"/>
  </g>
</svg>